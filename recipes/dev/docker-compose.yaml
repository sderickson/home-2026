services:
  caddy:
    depends_on:
      - recipes-clients
    build:
      context: ../..
      dockerfile: ./recipes/dev/Dockerfile
    ports:
      - 80:80
    volumes:
      - ./caddy-config:/etc/caddy/
      - caddy_data:/data
      - caddy_config:/config

  recipes-clients:
    image: sderickson-recipes-clients:latest
    build:
      context: ../..
      dockerfile: ./recipes/clients/build/Dockerfile
    environment:
      - CLIENT_SUBDOMAINS=recipes,app.recipes,admin.recipes,account.recipes
      - DOMAIN=docker.localhost
      - DEPLOYMENT_NAME=${DEPLOYMENT_NAME}
      - PROTOCOL=${PROTOCOL}
      - SERVICE_SUBDOMAINS=identity,api.recipes
      - TZ=${TZ}
    volumes:
      - ../../recipes/clients/:/app/recipes/clients/
      - ../../saflib/:/app/saflib/
      - ../../recipes/service/sdk/:/app/recipes/service/sdk/
    command: npm run dev

  monolith:
    image: ghcr.io/sderickson/sderickson-recipes-monolith:latest
    volumes:
      - ../../recipes/service/db/data:/app/recipes/service/db/data
      - ../../recipes/service/cron/data:/app/recipes/service/cron/data
      - ../../recipes/service/common/data/recipe-files:/app/recipes/service/common/data/recipe-files
      - ../../hub/service/identity/data:/app/hub/service/identity/data
      - identity_http_cache:/app/saflib/identity/identity-http/data

    build:
      context: ../..
      dockerfile: recipes/service/monolith/Dockerfile

    env_file:
      - ./env.dev
      - ./.env

  kratos-migrate:
    image: oryd/kratos:v26.2.0
    command: migrate sql -e --yes
    environment:
      - DSN=sqlite:///var/lib/sqlite/db.sqlite?_fk=true&mode=rwc
    volumes:
      # Persists SQLite (identities, sessions, flows) across container restarts
      - ./kratos/data:/var/lib/sqlite
      - ./kratos:/etc/config/kratos

  kratos:
    image: oryd/kratos:v26.2.0
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    environment:
      - DSN=sqlite:///var/lib/sqlite/db.sqlite?_fk=true&mode=rwc
    env_file:
      - ./env.kratos.config
    volumes:
      - ./kratos/data:/var/lib/sqlite
      - ./kratos:/etc/config/kratos

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    hostname: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    command: "azurite-blob --blobHost 0.0.0.0 --loose"

volumes:
  caddy_data:
  caddy_config:
  identity_http_cache:
