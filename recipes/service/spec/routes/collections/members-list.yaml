membersListCollections:
  summary: "List members of a collection (email, role, isCreator). Caller must be a member (any role) with validated email; creator always has access."
  operationId: "membersListCollections"

  parameters:
    - name: "id"
      in: "path"
      required: true
      schema:
        type: string
      description: "Collection id"

  responses:
    "200":
      description: "Members of the collection."
      content:
        application/json:
          schema:
            type: object
            required:
              - members
            properties:
              members:
                type: array
                items:
                  $ref: "../../schemas/collection-member.yaml"
                description: "List of collection members (email, role, isCreator)."

    "401":
      description: "Unauthorized - missing or invalid auth headers, or not logged in."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "403":
      description: "Forbidden - not a member or unvalidated email (creator excepted)."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "404":
      description: "Not Found - collection does not exist."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
