deleteCollections:
  summary: "Delete collection. Owner only. Forbidden if collection has any recipes (409)."
  operationId: "deleteCollections"

  parameters:
    - name: "id"
      in: "path"
      required: true
      schema:
        type: string
      description: "Collection id"

  responses:
    "204":
      description: "Collection deleted."

    "401":
      description: "Unauthorized - missing or invalid auth headers, or not logged in."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "403":
      description: "Forbidden - caller must be an owner of the collection."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "404":
      description: "Not Found - collection does not exist."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "409":
      description: "Conflict - collection has recipes; delete recipes first or use empty collection."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
