membersRemoveCollections:
  summary: "Remove a member from a collection. Owner only. Cannot remove the creator (permanent owner); returns 409 if attempted."
  operationId: "membersRemoveCollections"

  parameters:
    - name: "id"
      in: "path"
      required: true
      schema:
        type: string
      description: "Collection id"
    - name: "memberId"
      in: "path"
      required: true
      schema:
        type: string
      description: "Member record id"

  responses:
    "204":
      description: "Member removed."

    "401":
      description: "Unauthorized - missing or invalid auth headers, or not logged in."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "403":
      description: "Forbidden - caller must be an owner of the collection."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "404":
      description: "Not Found - collection or member does not exist."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "409":
      description: "Conflict - cannot remove the creator (permanent owner)."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
