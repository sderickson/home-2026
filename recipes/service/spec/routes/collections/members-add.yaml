membersAddCollections:
  summary: "Add a member to a collection (or update role if email already exists). Owner only."
  operationId: "membersAddCollections"

  parameters:
    - name: "id"
      in: "path"
      required: true
      schema:
        type: string
      description: "Collection id"

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
            - role
          properties:
            email:
              type: string
              format: email
              description: Member's email address
              example: "alice@example.com"
            role:
              type: string
              enum:
                - owner
                - editor
                - viewer
              description: Role to assign (or update if member already exists)
              example: "editor"

  responses:
    "200":
      description: "Added or updated member."
      content:
        application/json:
          schema:
            type: object
            required:
              - member
            properties:
              member:
                $ref: "../../schemas/collection-member.yaml"
                description: "The added or updated collection member."

    "401":
      description: "Unauthorized - missing or invalid auth headers, or not logged in."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "403":
      description: "Forbidden - caller must be an owner of the collection."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "404":
      description: "Not Found - collection does not exist."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
