recipeNoteFilesGetByNoteId:
  summary: "List all note files for a recipe (one request for the detail page)."
  operationId: "recipeNoteFilesGetByNoteId"
  tags:
    - "no-auth"

  parameters:
    - name: "id"
      in: "path"
      required: true
      schema:
        type: string
      description: "Recipe id"

  responses:
    "200":
      description: "All note files for the recipe (each item has recipeNoteId)."
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../schemas/recipe-note-file-info.yaml"

    "401":
      description: "Unauthorized - authentication required."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "403":
      description: "Forbidden - not a member of the recipe's collection, or insufficient role."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "404":
      description: "Not Found"
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
