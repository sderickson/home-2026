getRecipe:
  summary: "Get one recipe. With collectionId: must be member. Without: returns only if recipe is public (root app public detail)."
  operationId: "getRecipe"
  tags:
    - "no-auth"

  parameters:
    - name: "id"
      in: "path"
      required: true
      schema:
        type: string
      description: "Recipe id"
    - name: collectionId
      in: query
      required: false
      schema:
        type: string
      description: "Collection for scoped access (auth required). Omit for public-only (return recipe only if public)."

  responses:
    "200":
      description: "Recipe with current version; optionally includes recent notes and file list."
      content:
        application/json:
          schema:
            type: object
            required:
              - recipe
              - currentVersion
            properties:
              recipe:
                $ref: "../../schemas/recipe.yaml"
              currentVersion:
                $ref: "../../schemas/recipe-version.yaml"
              notes:
                type: array
                description: "Optional list of recent recipe notes."
                items:
                  type: object
              files:
                type: array
                description: "Optional list of recipe file info."
                items:
                  type: object

    "401":
      description: "Unauthorized - recipe is private and caller is not authenticated."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "403":
      description: "Forbidden - not a member of the recipe's collection (when collectionId is used)."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "404":
      description: "Not Found"
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
