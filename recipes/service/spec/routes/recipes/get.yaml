getRecipe:
  summary: "Get one recipe. Access from the recipe: public recipes allowed without auth; private recipes require auth and membership in the recipe's collection."
  operationId: "getRecipe"
  tags:
    - "no-auth"

  parameters:
    - name: "id"
      in: "path"
      required: true
      schema:
        type: string
      description: "Recipe id"

  responses:
    "200":
      description: "Recipe with current version; optionally includes recent notes and file list."
      content:
        application/json:
          schema:
            type: object
            required:
              - recipe
              - currentVersion
            properties:
              recipe:
                $ref: "../../schemas/recipe.yaml"
              currentVersion:
                $ref: "../../schemas/recipe-version.yaml"
              notes:
                type: array
                description: "Optional list of recent recipe notes."
                items:
                  type: object
              files:
                type: array
                description: "Optional list of recipe file info."
                items:
                  type: object

    "401":
      description: "Unauthorized - recipe is private and caller is not authenticated."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "403":
      description: "Forbidden - not a member of the recipe's collection."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "404":
      description: "Not Found"
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
