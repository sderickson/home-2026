listRecipes:
  summary: "List recipes in a collection. Auth required; caller must be at least viewer on the collection."
  operationId: "listRecipes"

  parameters:
    - name: collectionId
      in: query
      required: true
      schema:
        type: string
      description: Id of the collection to list recipes from.
  responses:
    "400":
      description: "Bad request - collectionId is required."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "401":
      description: "Unauthorized - collection listing requires authentication."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "403":
      description: "Forbidden - not a member of the collection or insufficient role."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "422":
      description: "Unprocessable - collection does not exist (validation)."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "200":
      description: "List of recipes in the collection."
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../schemas/recipe.yaml"
