# POST /recipes/:id/files/from-unsplash — add a recipe file from an Unsplash photo. Admin only.
filesFromUnsplashRecipes:
  summary: "Add a recipe file from an Unsplash photo. Backend fetches photo, tracks download, stores file and Unsplash user; returns RecipeFileInfo with unsplashAttribution when applicable."
  operationId: "filesFromUnsplashRecipes"

  parameters:
    - name: "id"
      in: "path"
      required: true
      schema:
        type: string
      description: "Recipe id"

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../schemas/add-recipe-file-from-unsplash-request.yaml"

  responses:
    "200":
      description: "Created recipe file metadata (includes unsplashAttribution when from Unsplash)."
      content:
        application/json:
          schema:
            $ref: "../../schemas/recipe-file-info.yaml"

    "401":
      description: "Unauthorized - missing or invalid auth headers, or not logged in."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "403":
      description: "Forbidden - user does not have required privileges (admin only)."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"

    "404":
      description: "Not Found - recipe not found."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
