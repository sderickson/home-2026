listMenus:
  summary: "List menus in a collection. Auth required; caller must be at least viewer on the collection."
  operationId: "listMenus"

  parameters:
    - name: collectionId
      in: query
      required: true
      schema:
        type: string
      description: Id of the collection to list menus from.

  responses:
    "200":
      description: "Menus in the collection."
      content:
        application/json:
          schema:
            type: object
            required:
              - menus
            properties:
              menus:
                type: array
                items:
                  $ref: "../../schemas/menu.yaml"
                description: List of menus.
    "400":
      description: "Bad request - collectionId is required."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "401":
      description: "Unauthorized - collection listing requires authentication."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "403":
      description: "Forbidden - not a member of the collection or insufficient role (at least viewer required)."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "422":
      description: "Unprocessable - collection does not exist (validation)."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
