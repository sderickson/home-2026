getMenus:
  summary: "Get one menu with groupings and full Recipe objects for every recipe in the menu. Auth required; caller must be at least viewer on the menu's collection. Query collectionId is required."
  operationId: "getMenu"

  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: Menu id.
    - name: collectionId
      in: query
      required: true
      schema:
        type: string
      description: Id of the collection (required for access).

  responses:
    "200":
      description: "Menu with groupings and flat array of full Recipe objects for every recipe in the menu's groupings."
      content:
        application/json:
          schema:
            type: object
            required:
              - menu
              - recipes
            properties:
              menu:
                $ref: "../../schemas/menu.yaml"
              recipes:
                type: array
                items:
                  $ref: "../../schemas/recipe.yaml"
                description: Full Recipe objects for every recipe referenced in the menu's groupings (enough to render the menu).
    "401":
      description: "Unauthorized - authentication required."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "403":
      description: "Forbidden - not a member of the collection or insufficient role."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "404":
      description: "Not found - menu does not exist."
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
