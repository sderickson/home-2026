openapi: 3.0.0
info:
  title: recipes API
  version: 1.0.0
  description: API specification for the recipes service

paths:
  # BEGIN WORKFLOW AREA route-paths FOR openapi/add-route
  /recipes:
    get:
      $ref: "./routes/recipes/list.yaml#/listRecipes"
    post:
      $ref: "./routes/recipes/create.yaml#/createRecipe"
  /recipes/{id}:
    get:
      $ref: "./routes/recipes/get.yaml#/getRecipe"
    put:
      $ref: "./routes/recipes/update.yaml#/updateRecipe"
    delete:
      $ref: "./routes/recipes/delete.yaml#/deleteRecipe"
  /recipes/{id}/versions:
    get:
      $ref: "./routes/recipes/versions-list.yaml#/listRecipeVersions"
    post:
      $ref: "./routes/recipes/versions-create.yaml#/createRecipeVersion"
  /recipes/{id}/versions/latest:
    put:
      $ref: "./routes/recipes/versions-latest-update.yaml#/updateRecipeVersionLatest"
  /recipes/{id}/notes:
    get:
      $ref: "./routes/recipes/notes-list.yaml#/notesListRecipes"
    post:
      $ref: "./routes/recipes/notes-create.yaml#/notesCreateRecipes"
  /recipes/{id}/notes/{noteId}:
    put:
      $ref: "./routes/recipes/notes-update.yaml#/notesUpdateRecipes"
    delete:
      $ref: "./routes/recipes/notes-delete.yaml#/notesDeleteRecipes"
  /recipes/{id}/files:
    get:
      $ref: "./routes/recipes/files-list.yaml#/filesListRecipes"
    post:
      $ref: "./routes/recipes/files-upload.yaml#/filesUploadRecipes"
  /recipes/{id}/files/{fileId}:
    delete:
      $ref: "./routes/recipes/files-delete.yaml#/filesDeleteRecipes"
  /recipes/{id}/files/{fileId}/blob:
    get:
      $ref: "./routes/recipes/files-download.yaml#/filesDownloadRecipes"
  /recipes/{id}/note-files:
    get:
      $ref: "./routes/recipes/notes-files-list-by-recipe.yaml#/recipeNoteFilesGetByNoteId"
  /recipes/{id}/notes/{noteId}/files:
    get:
      $ref: "./routes/recipes/notes-files-list.yaml#/notesFilesListRecipes"
    post:
      $ref: "./routes/recipes/notes-files-upload.yaml#/notesFilesUploadRecipes"
  /recipes/{id}/notes/{noteId}/files/{fileId}:
    delete:
      $ref: "./routes/recipes/notes-files-delete.yaml#/notesFilesDeleteRecipes"
  /recipes/{id}/notes/{noteId}/files/{fileId}/blob:
    get:
      $ref: "./routes/recipes/notes-files-download.yaml#/notesFilesDownloadRecipes"
  /unsplash-photos/search:
    get:
      $ref: "./routes/unsplash-photos/search.yaml#/searchUnsplashPhotos"
  /recipes/{id}/files/from-unsplash:
    post:
      $ref: "./routes/recipes/files-from-unsplash.yaml#/filesFromUnsplashRecipes"
  /collections:
    get:
      $ref: "./routes/collections/list.yaml#/listCollections"
    post:
      $ref: "./routes/collections/create.yaml#/createCollections"
  /collections/{id}:
    get:
      $ref: "./routes/collections/get.yaml#/getCollections"
    put:
      $ref: "./routes/collections/update.yaml#/updateCollections"
    delete:
      $ref: "./routes/collections/delete.yaml#/deleteCollections"
  /collections/{id}/members:
    get:
      $ref: "./routes/collections/members-list.yaml#/membersListCollections"
    post:
      $ref: "./routes/collections/members-add.yaml#/membersAddCollections"
  /collections/{id}/members/{memberId}:
    put:
      $ref: "./routes/collections/members-update.yaml#/membersUpdateCollections"
    delete:
      $ref: "./routes/collections/members-remove.yaml#/membersRemoveCollections"
  /menus:
    get:
      $ref: "./routes/menus/list.yaml#/listMenus"
  # END WORKFLOW AREA

components:
  schemas:
    Error:
      $ref: "./schemas/error.yaml"
    ProductEvent:
      $ref: "./events/index.yaml"
    # BEGIN WORKFLOW AREA schema-components FOR openapi/add-schema

    Recipe:
      $ref: "./schemas/recipe.yaml"
    RecipeVersion:
      $ref: "./schemas/recipe-version.yaml"
    RecipeNote:
      $ref: "./schemas/recipe-note.yaml"
    RecipeFileInfo:
      $ref: "./schemas/recipe-file-info.yaml"
    RecipeNoteFileInfo:
      $ref: "./schemas/recipe-note-file-info.yaml"
    UnsplashPhotoSearchItem:
      $ref: "./schemas/unsplash-photo-search-item.yaml"
    AddRecipeFileFromUnsplashRequest:
      $ref: "./schemas/add-recipe-file-from-unsplash-request.yaml"
    UnsplashAttribution:
      $ref: "./schemas/unsplash-attribution.yaml"
    Collection:
      $ref: "./schemas/collection.yaml"
    CollectionMember:
      $ref: "./schemas/collection-member.yaml"
    Menu:
      $ref: "./schemas/menu.yaml"
    # END WORKFLOW AREA
