version: v1.3.1

dsn: sqlite:///var/lib/sqlite/db.sqlite?_fk=true&mode=rwc

serve:
  public:
    base_url: https://kratos.scotterickson.info/
    cors:
      enabled: false
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: https://auth.scotterickson.info/

  flows:
    registration:
      enabled: true
      ui_url: https://auth.scotterickson.info/registration

    login:
      ui_url: https://auth.scotterickson.info/login

    logout:
      after:
        default_browser_return_url: https://auth.scotterickson.info/

    verification:
      enabled: true
      ui_url: https://auth.scotterickson.info/verification
      use: code

  methods:
    password:
      enabled: true

session:
  cookie:
    domain: .scotterickson.info
    same_site: Lax

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  delivery_strategy: http
  http:
    request_config:
      url: http://monolith:3000/email/kratos-courier
      method: POST
      body: file:///etc/config/kratos/courier-body.jsonnet
      headers:
        Content-Type: application/json

# TODO: replace with real secrets before deploying to production
secrets:
  cookie:
    - CHANGE-ME-TO-A-REAL-SECRET-KEY1
  cipher:
    - CHANGE-ME-32-CHARS-LONG-SECRET!

log:
  level: info
  format: text
